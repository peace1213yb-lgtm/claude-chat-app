<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="LINE風UIでClaudeとチャットできるアプリ">
  <title>Claude Chat - LINE Style</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <div id="sidebar-overlay" class="sidebar-overlay hidden"></div>
    <aside id="sidebar" class="sidebar hidden">
      <div class="sidebar-header">
        <span class="sidebar-title">チャット</span>
        <button id="sidebar-close-btn" class="icon-btn sidebar-close-btn" aria-label="閉じる">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="sidebar-actions">
        <button id="new-chat-btn" class="new-chat-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          新しいチャット
        </button>
      </div>
      <div id="chat-list" class="chat-list">
        <div class="chat-list-empty">チャットがありません</div>
      </div>
    </aside>

    <!-- Header -->
    <header id="chat-header">
      <div class="header-left">
        <button id="menu-btn" class="icon-btn" aria-label="メニュー">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="header-center">
        <div class="header-avatar">
          <img src="icon_hands_circle.png" alt="はるくん" class="avatar-img">
        </div>
        <div class="header-info">
          <h1 id="header-title">Claude</h1>
          <span id="header-status" class="status-online">オンライン</span>
        </div>
      </div>
      <div class="header-right">
        <button id="settings-btn" class="icon-btn" aria-label="設定">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
        </button>
      </div>
    </header>

    <!-- Model Selector Bar -->
    <div id="model-bar">
      <div class="model-bar-inner">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
        <select id="model-select">
          <option value="claude-opus-4-6">Claude Opus 4.6</option>
          <option value="claude-opus-4-5">Claude Opus 4.5</option>
          <option value="claude-sonnet-4-6">Claude Sonnet 4.6</option>
          <option value="claude-sonnet-4-5" selected>Claude Sonnet 4.5</option>
          <option value="claude-haiku-4-5">Claude Haiku 4.5</option>
        </select>
      </div>
    </div>

    <!-- Settings Panel (Slide-in) -->
    <div id="settings-overlay" class="overlay hidden"></div>
    <aside id="settings-panel" class="panel hidden">
      <div class="panel-header">
        <h2>設定</h2>
        <button id="settings-close-btn" class="icon-btn panel-close-btn" aria-label="閉じる">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="panel-body">
        <!-- System Prompt -->
        <div class="setting-group">
          <label for="system-prompt" class="setting-label">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
              <polyline points="14 2 14 8 20 8"></polyline>
              <line x1="16" y1="13" x2="8" y2="13"></line>
              <line x1="16" y1="17" x2="8" y2="17"></line>
            </svg>
            システムプロンプト
          </label>
          <textarea id="system-prompt" placeholder="Claudeへの指示を入力してください。例: あなたは優しい日本語の先生です。" rows="6"></textarea>
          <p class="setting-hint">Claudeの振る舞いをカスタマイズするためのプロンプトです</p>
        </div>

        <!-- Chat History Clear -->
        <div class="setting-group">
          <label class="setting-label">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="3 6 5 6 21 6"></polyline>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            </svg>
            チャット履歴
          </label>
          <button id="clear-chat-btn" class="danger-btn">チャット履歴をクリア</button>
        </div>

        <!-- Reference File -->
        <div class="setting-group">
          <label class="setting-label">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
              <polyline points="14 2 14 8 20 8"></polyline>
              <line x1="16" y1="13" x2="8" y2="13"></line>
              <line x1="16" y1="17" x2="8" y2="17"></line>
              <polyline points="10 9 9 9 8 9"></polyline>
            </svg>
            参照ファイル
            <span id="ref-file-count" class="memory-count" style="display:none;">0</span>
          </label>
          <p class="setting-hint">アップロードしたファイルの内容を毎回の会話に含めます</p>
          <div id="ref-file-list" class="ref-file-list"></div>
          <div id="ref-file-loading" class="ref-file-loading" style="display:none;">
            <div class="typing-indicator" style="padding:8px 0;">
              <span></span><span></span><span></span>
            </div>
            <span>テキストを抽出中...</span>
          </div>
          <label class="ref-file-upload-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="17 8 12 3 7 8"></polyline>
              <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            ファイルを追加
            <input type="file" id="ref-file-input" accept=".pdf,.txt,.md,.csv,.json,.xml,.html" style="display:none;">
          </label>
        </div>

        <!-- Memory Section -->
        <div class="setting-group">
          <label class="setting-label">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2z"/>
              <path d="M12 6v6l4 2"/>
            </svg>
            メモリ
            <span id="memory-count" class="memory-count" style="display:none;">0</span>
          </label>
          <div id="memory-list" class="memory-list">
            <div class="memory-empty">メモリはまだありません</div>
          </div>
        </div>
      </div>
    </aside>

    <!-- Chat Messages Area -->
    <main id="chat-messages">
      <div id="welcome-message" class="welcome">
        <div class="welcome-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
          </svg>
        </div>
        <h2>Claudeとチャット</h2>
        <p>メッセージを入力して会話を始めましょう</p>
      </div>
    </main>

    <!-- Input Area -->
    <footer id="chat-input-area">
      <div id="file-preview" class="file-preview hidden">
        <div class="file-preview-inner">
          <span id="file-preview-icon" class="file-preview-icon">📎</span>
          <span id="file-preview-name" class="file-preview-name"></span>
          <button id="file-remove-btn" class="file-remove-btn" aria-label="ファイルを削除">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
      </div>
      <div class="input-wrapper">
        <button id="attach-btn" class="attach-btn" aria-label="ファイル添付">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
          </svg>
        </button>
        <input type="file" id="file-input" accept="image/*,.pdf" style="display:none;">
        <textarea id="message-input" placeholder="メッセージを入力..." rows="1" aria-label="メッセージ入力"></textarea>
        <button id="send-btn" class="send-btn" disabled aria-label="送信">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
    </footer>

    <!-- Memory Toast -->
    <div id="memory-toast" class="memory-toast">
      <span class="memory-toast-icon">🧠</span>
      <span id="memory-toast-text">メモリに保存しました</span>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
